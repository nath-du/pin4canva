<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>Pin4Canva</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>Pin4Canva</h1>
    <div class="tab-lista">
      <button id="tabCerca" class="tab active">Cerca</button>
      <button id="tabSalvati" class="tab">Collezione <span id="conteggioSalvati">0</span></button>
    </div>
  </header>

  <section id="vistaCerca">
    <form id="formCerca">
      <input id="inputCerca" type="text" placeholder="Cerca" autofocus />
      <button type="submit">Cerca</button>
    </form>
    <div class="opzioni">
      <label class="toggle-container">
        <input type="checkbox" id="autoRimuoviBg">
        <span class="toggle-label">Rimuovi sfondo automaticamente</span>
      </label>
      <input type="password" id="chiaveRemoveBg" placeholder="Remove.bg API Key" class="api-input">
    </div>
    <div id="statoCerca" class="stato"></div>
    <div id="risultatiCerca" class="grid"></div>
  </section>

  <section id="vistaSalvati" class="nascosto">
    <div id="risultatiSalvati" class="grid"></div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
